version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///threattron.db
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    volumes:
      - ./DataSet.csv:/app/DataSet.csv
      - ./Behavioural-model/models:/app/Behavioural-model/models
      - ./Behavioural-model/processed:/app/Behavioural-model/processed

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
